function initGraph(data) {
  const nodeIds = new Set(data.nodes.map(n => n.id));
  data.edges = data.edges.filter(e => nodeIds.has(e.from) && nodeIds.has(e.to));
  data.edges.forEach(e => {
    e.source = e.from;
    e.target = e.to;
  });
  const container = document.getElementById('canvas-container');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const svg = d3.select('#graph');
  const tooltip = document.getElementById('tooltip');

  // Connection counts
  const connectionCount = {};
  data.edges.forEach(e => {
    connectionCount[e.from] = (connectionCount[e.from] || 0) + 1;
    connectionCount[e.to] = (connectionCount[e.to] || 0) + 1;
  });

  // Size nodes by connections
  data.nodes.forEach(n => {
    n.connections = connectionCount[n.id] || 0;
  });

  // Stats
  document.getElementById('node-count').textContent = data.nodes.length;
  document.getElementById('edge-count').textContent = data.edges.length;

  // Build node filters
  const tagCounts = {};
  data.nodes.forEach(n => { tagCounts[n.tag] = (tagCounts[n.tag] || 0) + 1; });
  const nodeFiltersEl = document.getElementById('node-filters');
  Object.keys(TAG_COLORS).forEach(tag => {
    if (!tagCounts[tag]) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.innerHTML = `<span class="dot" style="background:${TAG_COLORS[tag]}"></span>${TAG_LABELS[tag]}<span class="count">${tagCounts[tag]}</span>`;
    btn.onclick = () => {
      if (activeNodeTags.has(tag)) activeNodeTags.delete(tag); else activeNodeTags.add(tag);
      btn.classList.toggle('active');
      updateVisibility();
    };
    nodeFiltersEl.appendChild(btn);
  });

  // Build edge filters
  const edgeCounts = {};
  data.edges.forEach(e => { edgeCounts[e.type] = (edgeCounts[e.type] || 0) + 1; });
  const edgeFiltersEl = document.getElementById('edge-filters');
  Object.keys(EDGE_COLORS).forEach(type => {
    if (!edgeCounts[type]) return;
    const btn = document.createElement('button');
    btn.className = 'edge-filter-btn active';
    btn.innerHTML = `<span class="eline" style="background:${EDGE_COLORS[type]}"></span>${EDGE_LABELS[type]}<span class="count">${edgeCounts[type]}</span>`;
    btn.onclick = () => {
      if (activeEdgeTypes.has(type)) activeEdgeTypes.delete(type); else activeEdgeTypes.add(type);
      btn.classList.toggle('active');
      updateVisibility();
    };
    edgeFiltersEl.appendChild(btn);
  });

  // Strength slider
  const strengthRange = document.getElementById('strength-range');
  const strVal = document.getElementById('str-val');
  strengthRange.oninput = () => {
    minStrength = +strengthRange.value;
    strVal.textContent = minStrength;
    updateVisibility();
  };

  // Search
  const searchInput = document.getElementById('search');
  searchInput.oninput = () => {
    searchQuery = searchInput.value.toLowerCase().trim();
    const exactMatch = data.nodes.find(n => n.id.toLowerCase() === searchQuery || n.company.toLowerCase() === searchQuery);
    if (exactMatch) {
      clickedNode = exactMatch.id;
    } else if (searchQuery === '') {
      clickedNode = null;
    }
    updateHighlight();
    updateVisibility();
  };

  // D3 force simulation
  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.1, 6])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });
  svg.call(zoom);

  // Zoom controls
  document.getElementById('zoom-in').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
  document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
  document.getElementById('zoom-fit').onclick = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.4));

  // Arrow markers
  const defs = svg.append('defs');
  Object.keys(EDGE_COLORS).forEach(type => {
    defs.append('marker')
      .attr('id', `arrow-${type}`)
      .attr('viewBox', '0 0 10 10')
      .attr('refX', 28)
      .attr('refY', 5)
      .attr('markerWidth', 5)
      .attr('markerHeight', 5)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M 0 0 L 10 5 L 0 10 z')
      .attr('fill', EDGE_COLORS[type])
      .attr('opacity', 0.6);
  });

  // Links
  const linkGroup = g.append('g').attr('class', 'links');
  const link = linkGroup.selectAll('g.edge')
    .data(data.edges)
    .join('g')
    .attr('class', 'edge');
    
  const linkLine = link.append('line')
    .attr('stroke', d => EDGE_COLORS[d.type] || '#333')
    .attr('stroke-width', d => 0.5 + d.strength * 0.4)
    .attr('stroke-opacity', 0.25)
    .attr('marker-end', d => d.direction !== 'competitor' && d.direction !== 'lateral' ? `url(#arrow-${d.type})` : null);
    
  const linkTextBg = link.append('text')
    .text(d => EDGE_LABELS[d.type] || d.type)
    .attr('fill', 'none')
    .attr('stroke', '#0c101e')
    .attr('stroke-width', '4px')
    .attr('stroke-linejoin', 'round')
    .attr('font-size', '10px')
    .attr('font-weight', '700')
    .attr('text-anchor', 'middle')
    .attr('pointer-events', 'none')
    .attr('opacity', 0);

  const linkText = link.append('text')
    .text(d => EDGE_LABELS[d.type] || d.type)
    .attr('fill', d => EDGE_COLORS[d.type] || '#e0e6f0')
    .attr('font-size', '10px')
    .attr('font-weight', '700')
    .attr('text-anchor', 'middle')
    .attr('pointer-events', 'none')
    .attr('opacity', 0);

  // Nodes
  const nodeGroup = g.append('g').attr('class', 'nodes');
  const node = nodeGroup.selectAll('g')
    .data(data.nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  // Node circles
  node.append('circle')
    .attr('r', d => 5 + Math.sqrt(d.connections) * 2.5)
    .attr('fill', d => TAG_COLORS[d.tag] || TAG_COLORS.other)
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => TAG_COLORS[d.tag] || TAG_COLORS.other)
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.3);

  // Glow for high-connection nodes
  node.filter(d => d.connections >= 15)
    .select('circle')
    .attr('filter', 'url(#glow)');

  // Glow filter
  const glowFilter = defs.append('filter').attr('id', 'glow');
  glowFilter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'glow');
  const feMerge = glowFilter.append('feMerge');
  feMerge.append('feMergeNode').attr('in', 'glow');
  feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

  // Labels
  node.append('text')
    .text(d => d.label)
    .attr('font-size', d => d.connections >= 20 ? 11 : d.connections >= 10 ? 9 : 7)
    .attr('font-weight', d => d.connections >= 15 ? 600 : 400)
    .attr('fill', '#c8d0e0')
    .attr('text-anchor', 'middle')
    .attr('dy', d => -(8 + Math.sqrt(d.connections) * 2.5))
    .attr('pointer-events', 'none')
    .attr('opacity', d => d.connections >= 5 ? 1 : 0.7);

  // Simulation
  const simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.edges).id(d => d.id).distance(d => 80 + (5 - d.strength) * 20).strength(d => 0.1 + d.strength * 0.05))
    .force('charge', d3.forceManyBody().strength(d => -100 - d.connections * 8))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => 12 + Math.sqrt(d.connections) * 3))
    .force('x', d3.forceX(width / 2).strength(0.03))
    .force('y', d3.forceY(height / 2).strength(0.03))
    .alphaDecay(0.05);

  simulation.on('tick', () => {
    linkLine
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    linkTextBg
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2 - 5)
      .attr('transform', d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        let angle = Math.atan2(dy, dx) * 180 / Math.PI;
        if (angle > 90 || angle < -90) angle += 180;
        return `rotate(${angle}, ${(d.source.x + d.target.x) / 2}, ${(d.source.y + d.target.y) / 2})`;
      });
    linkText
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2 - 5)
      .attr('transform', d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        let angle = Math.atan2(dy, dx) * 180 / Math.PI;
        if (angle > 90 || angle < -90) angle += 180;
        return `rotate(${angle}, ${(d.source.x + d.target.x) / 2}, ${(d.source.y + d.target.y) / 2})`;
      });
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Background click to clear
  svg.on('click', () => {
    clickedNode = null;
    updateHighlight();
  });

  // Click to isolate
  node.on('click', (event, d) => {
    clickedNode = clickedNode === d.id ? null : d.id;
    updateHighlight();
    if (clickedNode) openSidePanel(d); else sidePanel.classList.remove('open');
    event.stopPropagation();
  });

  // Hover
  node.on('mouseenter', (event, d) => {
    highlightedNode = d.id;
    updateHighlight();
    const related = data.edges.filter(e => e.from === d.id || e.to === d.id);
    const upstream = related.filter(e => e.direction === 'upstream' && e.from === d.id).map(e => e.to);
    const downstream = related.filter(e => e.direction === 'downstream' && e.from === d.id).map(e => e.to);
    const competitors = related.filter(e => e.direction === 'competitor').map(e => e.from === d.id ? e.to : e.from);
    const lateral = related.filter(e => e.direction === 'lateral').map(e => e.from === d.id ? e.to : e.from);

    let html = `<div class="tt-ticker" style="color:${TAG_COLORS[d.tag]}">${d.label}</div>`;
    html += `<div class="tt-company">${d.company}</div>`;
    html += `<div class="tt-tag" style="background:${TAG_COLORS[d.tag]}22;color:${TAG_COLORS[d.tag]}">${TAG_LABELS[d.tag] || d.tag}</div>`;
    html += `<div class="tt-connections">`;
    html += `<strong>${related.length}</strong> total relationships<br>`;
    if (upstream.length) html += `↑ <strong>${upstream.length}</strong> upstream suppliers<br>`;
    if (downstream.length) html += `↓ <strong>${downstream.length}</strong> downstream customers<br>`;
    if (competitors.length) html += `⚔ <strong>${competitors.length}</strong> competitors<br>`;
    if (lateral.length) html += `↔ <strong>${lateral.length}</strong> lateral partners<br>`;
    html += `</div>`;
    tooltip.innerHTML = html;
    tooltip.classList.add('visible');
    positionTooltip(event);
  });

  node.on('mousemove', (event) => positionTooltip(event));
  node.on('mouseleave', () => {
    highlightedNode = null;
    updateHighlight();
    tooltip.classList.remove('visible');
  });

  // Edge hover
  linkLine.on('mouseenter', (event, d) => {
    const fromNode = data.nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.from));
    const toNode = data.nodes.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.to));
    let html = `<span class="tt-edge-from" style="color:${TAG_COLORS[fromNode?.tag]}">${fromNode?.label || d.from}</span>`;
    html += ` → `;
    html += `<span class="tt-edge-to" style="color:${TAG_COLORS[toNode?.tag]}">${toNode?.label || d.to}</span>`;
    html += `<br><div class="tt-edge-type" style="background:${EDGE_COLORS[d.type]}22;color:${EDGE_COLORS[d.type]}">${EDGE_LABELS[d.type] || d.type}</div>`;
    html += `<div class="tt-edge-detail">`;
    html += `Strength: ${'★'.repeat(d.strength)}${'☆'.repeat(5-d.strength)}<br>`;
    html += `Confidence: ${'●'.repeat(d.confidence)}${'○'.repeat(5-d.confidence)}<br>`;
    html += `Direction: ${d.direction}<br>`;
    html += `Source: ${d.evidence}`;
    html += `</div>`;
    tooltip.innerHTML = html;
    tooltip.classList.add('visible');
    positionTooltip(event);
  });
  linkLine.on('mousemove', (event) => positionTooltip(event));
  linkLine.on('mouseleave', () => tooltip.classList.remove('visible'));

  function positionTooltip(event) {
    const x = event.clientX + 14;
    const y = event.clientY + 14;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? event.clientX - tw - 10 : x) + 'px';
    tooltip.style.top = (y + th > window.innerHeight ? event.clientY - th - 10 : y) + 'px';
  }

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.1).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  // -- Visibility / Filter --
  function updateVisibility() {
    const visibleNodes = new Set();
    data.nodes.forEach(n => {
      let visible = activeNodeTags.has(n.tag);
      if (searchQuery && visible) {
        visible = n.id.toLowerCase().includes(searchQuery) || n.company.toLowerCase().includes(searchQuery);
      }
      if (visible) visibleNodes.add(n.id);
    });

    node.attr('opacity', d => visibleNodes.has(d.id) ? 1 : 0.06);
    node.attr('pointer-events', d => visibleNodes.has(d.id) ? 'all' : 'none');

    link.attr('opacity', d => {
      const sourceId = typeof d.source === 'object' ? d.source.id : d.from;
      const targetId = typeof d.target === 'object' ? d.target.id : d.to;
      const nodesVisible = visibleNodes.has(sourceId) && visibleNodes.has(targetId);
      const typeVisible = activeEdgeTypes.has(d.type);
      const strengthOk = d.strength >= minStrength;
      return nodesVisible && typeVisible && strengthOk ? 0.3 : 0.02;
    });
    link.attr('pointer-events', d => {
      const sourceId = typeof d.source === 'object' ? d.source.id : d.from;
      const targetId = typeof d.target === 'object' ? d.target.id : d.to;
      const nodesVisible = visibleNodes.has(sourceId) && visibleNodes.has(targetId);
      const typeVisible = activeEdgeTypes.has(d.type);
      const strengthOk = d.strength >= minStrength;
      return nodesVisible && typeVisible && strengthOk ? 'all' : 'none';
    });

    // Update visible counts
    const visibleEdges = data.edges.filter(e => {
      const sourceId = typeof e.source === 'object' ? e.source.id : e.from;
      const targetId = typeof e.target === 'object' ? e.target.id : e.to;
      return visibleNodes.has(sourceId) && visibleNodes.has(targetId) && activeEdgeTypes.has(e.type) && e.strength >= minStrength;
    });
    document.getElementById('node-count').textContent = visibleNodes.size;
    document.getElementById('edge-count').textContent = visibleEdges.length;
  }

  function updateHighlight() {
    const focusNode = clickedNode || highlightedNode;
    if (focusNode) {
      const connectedNodes = new Set([focusNode]);
      data.edges.forEach(e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.from;
        const tid = typeof e.target === 'object' ? e.target.id : e.to;
        if (sid === focusNode) connectedNodes.add(tid);
        if (tid === focusNode) connectedNodes.add(sid);
      });
      node.select('circle').attr('fill-opacity', d => connectedNodes.has(d.id) ? 1 : 0.08);
      node.select('text').attr('opacity', d => connectedNodes.has(d.id) ? 1 : 0.08);
      linkLine.attr('stroke-opacity', d => {
        const sid = typeof d.source === 'object' ? d.source.id : d.from;
        const tid = typeof d.target === 'object' ? d.target.id : d.to;
        return sid === focusNode || tid === focusNode ? 1.0 : 0.03;
      });
      linkLine.attr('stroke-width', d => {
        const sid = typeof d.source === 'object' ? d.source.id : d.from;
        const tid = typeof d.target === 'object' ? d.target.id : d.to;
        return sid === focusNode || tid === focusNode ? 2.5 + d.strength * 1.5 : 0.5 + d.strength * 0.4;
      });
      if (clickedNode) {
        linkTextBg.attr('opacity', d => {
          const sid = typeof d.source === 'object' ? d.source.id : d.from;
          const tid = typeof d.target === 'object' ? d.target.id : d.to;
          return sid === clickedNode || tid === clickedNode ? 1 : 0;
        });
        linkText.attr('opacity', d => {
          const sid = typeof d.source === 'object' ? d.source.id : d.from;
          const tid = typeof d.target === 'object' ? d.target.id : d.to;
          return sid === clickedNode || tid === clickedNode ? 1 : 0;
        });
      } else {
        linkTextBg.attr('opacity', 0);
        linkText.attr('opacity', 0);
      }
    } else {
      node.select('circle').attr('fill-opacity', 0.85);
      node.select('text').attr('opacity', d => d.connections >= 5 ? 1 : 0.7);
      linkLine.attr('stroke-opacity', 0.25);
      linkLine.attr('stroke-width', d => 0.5 + d.strength * 0.4);
      linkText.attr('opacity', 0);
      linkTextBg.attr('opacity', 0);
    }
  }

  // Initial fit
  setTimeout(() => {
    svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.5).translate(-width/2, -height/2));
  }, 2000);
}

  const sidePanel = document.getElementById('side-panel');
  document.getElementById('sp-close').onclick = () => {
    sidePanel.classList.remove('open');
    clickedNode = null;
    updateHighlight();
  };
  
  let radarChart = null;

  document.getElementById('macro-button').onclick = () => openMacroPanel();
  document.getElementById('sector-button').onclick = () => openSectorPanel();
  document.getElementById('energy-button').onclick = () => openEnergyPanel();

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  function formatThemeName(key) {
    return key.replace(/_sentiment$/, '').replace(/_/g, ' ');
  }

  function topSentimentThemes(sentiment, limit=3) {
    const ignored = new Set(['general_sentiment_score', 'risk_sentiment']);
    return Object.entries(sentiment || {})
      .filter(([key, val]) => key.endsWith('_sentiment') && !ignored.has(key) && typeof val === 'number' && Math.abs(val) >= 0.15)
      .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
      .slice(0, limit);
  }

  function renderPills(items) {
    if (!items.length) return '';
    return `<div class="sp-pill-row">${items.map(([key, val]) => `<span class="sp-pill">${escapeHtml(formatThemeName(key))}: ${Number(val).toFixed(2)}</span>`).join('')}</div>`;
  }

  function buildSentimentSummary(d, details) {
    const sentiment = details.sentiment || {};
    const generic = 'Seeded from sentiment_verification_export.csv for macro aggregation.';
    const stored = sentiment.sentiment_summary;
    if (stored && stored !== generic) return stored;

    const score = Number(sentiment.general_sentiment_score || 0);
    const label = score > 0.15 ? 'positive' : score < -0.15 ? 'negative' : 'neutral';
    const themes = topSentimentThemes(sentiment, 4);
    const themeText = themes.length
      ? themes.map(([key, val]) => `${formatThemeName(key)} ${val > 0 ? 'positive' : 'negative'} (${val.toFixed(2)})`).join(', ')
      : 'no strong single theme';
    const risk = typeof sentiment.risk_sentiment === 'number'
      ? ` Risk reads ${sentiment.risk_sentiment >= 0.6 ? 'elevated' : sentiment.risk_sentiment >= 0.3 ? 'moderate' : 'contained'} (${sentiment.risk_sentiment.toFixed(2)}).`
      : '';
    const headline = details.news && details.news.length ? ` Latest headline: ${details.news[0].headline || 'not available'}.` : '';
    return `${d.id} sentiment is ${label} with a general score of ${score.toFixed(2)}. Main drivers: ${themeText}.${risk}${headline}`;
  }

  function buildCompanyOverview(d, details) {
    if (d.ai_overview) return d.ai_overview;
    const market = details.market || {};
    const sentiment = details.sentiment || {};
    const tag = TAG_LABELS[d.tag] || d.tag || 'semiconductor';
    const move = typeof market.return_1d === 'number'
      ? ` Latest daily return is ${(market.return_1d * 100).toFixed(2)}%`
      : '';
    const general = typeof sentiment.general_sentiment_score === 'number'
      ? ` with sentiment score ${sentiment.general_sentiment_score.toFixed(2)}`
      : '';
    const themes = topSentimentThemes(sentiment, 3).map(([key]) => formatThemeName(key));
    const themeText = themes.length ? ` Current narrative is most tied to ${themes.join(', ')}.` : '';
    return `${d.company || d.id} is classified as ${tag}.${move}${general}.${themeText}`.trim();
  }

  function openMacroPanel() {
    const macro = graphData.macro || {};
    const market = macro.market || {};
    sidePanel.classList.add('open');
    document.getElementById('sp-ticker').textContent = 'Macro';
    document.getElementById('sp-company').textContent = market.date ? `Semiconductor market sentiment, ${market.date}` : 'Semiconductor market sentiment';
    const tagEl = document.getElementById('sp-tag');
    tagEl.textContent = 'Market';
    tagEl.style.background = '#60a5fa22';
    tagEl.style.color = '#60a5fa';

    let contentHtml = '';
    if (market.macro_market_overview) {
      contentHtml += `<div class="sp-section"><h3>Market Overview</h3><div class="sp-summary">${escapeHtml(market.macro_market_overview)}</div>`;
      contentHtml += generateGridHTML(market, ['date', 'macro_market_overview'], true);
      contentHtml += `</div>`;
    }
    document.getElementById('sp-content').innerHTML = contentHtml || '<div class="sp-section"><div class="sp-summary">No macro sentiment data is available yet.</div></div>';
  }

  function openSectorPanel() {
    const sectors = graphData.macro?.sectors || [];
    sidePanel.classList.add('open');
    document.getElementById('sp-ticker').textContent = 'Sectors';
    document.getElementById('sp-company').textContent = sectors.length && sectors[0].date ? `Sector sentiment, ${sectors[0].date}` : 'Sector sentiment';
    const tagEl = document.getElementById('sp-tag');
    tagEl.textContent = 'Sector Breakdown';
    tagEl.style.background = '#a78bfa22';
    tagEl.style.color = '#c4b5fd';

    let contentHtml = '';
    if (sectors.length) {
      contentHtml += `<div class="sp-section"><h3>Sector Overviews</h3>`;
      sectors.forEach(sector => {
        contentHtml += `
          <div class="sp-news-item">
            <div style="font-size: 12px; font-weight: 700; color: #e2e8f0; text-transform: capitalize; margin-bottom: 4px;">${escapeHtml(sector.sector)}</div>
            <div class="sp-summary">${escapeHtml(sector.sector_overview || '')}</div>
            ${renderPills(topSentimentThemes(sector, 3))}
          </div>
        `;
      });
      contentHtml += `</div>`;
    }
    document.getElementById('sp-content').innerHTML = contentHtml || '<div class="sp-section"><div class="sp-summary">No sector sentiment data is available yet.</div></div>';
  }

  function openEnergyPanel() {
    const sectors = graphData.macro?.sectors || [];
    const energySector = sectors.find(sector => sector.sector === 'energy');
    sidePanel.classList.add('open');
    document.getElementById('sp-ticker').textContent = 'Energy';
    document.getElementById('sp-company').textContent = energySector?.date ? `Energy / solar sentiment, ${energySector.date}` : 'Energy / solar sentiment';
    const tagEl = document.getElementById('sp-tag');
    tagEl.textContent = 'Energy / Solar';
    tagEl.style.background = '#22d3ee22';
    tagEl.style.color = '#67e8f9';

    if (!energySector) {
      document.getElementById('sp-content').innerHTML = '<div class="sp-section"><div class="sp-summary">No energy sentiment data is available yet.</div></div>';
      return;
    }

    let contentHtml = `
      <div class="sp-section" style="background: rgba(34, 211, 238, 0.06); border-color: rgba(34, 211, 238, 0.22);">
        <h3 style="color: #67e8f9;">Energy / Solar Sentiment</h3>
        <div class="sp-summary">${escapeHtml(energySector.sector_overview || '')}</div>
        ${renderPills([
          ['general_sentiment_score', energySector.general_sentiment_score],
          ['ai_demand_sentiment', energySector.ai_demand_sentiment],
          ['consumer_demand_sentiment', energySector.consumer_demand_sentiment],
          ['analyst_sentiment', energySector.analyst_sentiment],
          ['risk_sentiment', energySector.risk_sentiment]
        ].filter(([, val]) => typeof val === 'number'))}
        ${generateGridHTML(energySector, ['date', 'sector', 'sector_overview'], true)}
      </div>
    `;
    document.getElementById('sp-content').innerHTML = contentHtml;
  }

  function generateGridHTML(dataObj, skipKeys=[], skipZeroes=false) {
    let html = '<div class="sp-grid">';
    for (const [key, val] of Object.entries(dataObj)) {
      if (skipKeys.includes(key) || val === null || val === '') continue;
      if (skipZeroes && val === 0 && key !== 'general_sentiment_score') continue;
      
      let fmtVal = val;
      if (typeof val === 'number') {
        if (Math.abs(val) > 1e9) fmtVal = (val/1e9).toFixed(2) + 'B';
        else if (Math.abs(val) > 1e6) fmtVal = (val/1e6).toFixed(2) + 'M';
        else if (val % 1 !== 0) fmtVal = val.toFixed(4);
      }
      
      let label = key.replace(/_/g, ' ');
      html += `<div class="sp-metric"><span class="sp-m-label">${escapeHtml(label)}</span><span class="sp-m-value">${escapeHtml(fmtVal)}</span></div>`;
    }
    html += '</div>';
    return html;
  }

  function openSidePanel(d) {
    try {
      console.log("Opening side panel for:", d.id);
      if (!sidePanel) {
        alert("CRITICAL ERROR: sidePanel DOM element not found!");
        return;
      }
      sidePanel.classList.add('open');
      
      const elTicker = document.getElementById('sp-ticker');
      if (elTicker) elTicker.textContent = d.id || 'Unknown';
      
      const elCompany = document.getElementById('sp-company');
      if (elCompany) elCompany.textContent = d.company || 'Unknown';
      
      const tagEl = document.getElementById('sp-tag');
      if (tagEl) {
        tagEl.textContent = TAG_LABELS[d.tag] || d.tag || 'Unknown';
        tagEl.style.background = (TAG_COLORS[d.tag] || '#64748b') + '22';
        tagEl.style.color = TAG_COLORS[d.tag] || '#64748b';
      }
      
      const details = graphData.details[d.id] || {};
      let contentHtml = '';
      
      const companyOverview = buildCompanyOverview(d, details);
      if (companyOverview) {
        contentHtml += `
          <div class="sp-section" style="background: rgba(124, 58, 237, 0.05); border: 1px solid rgba(124, 58, 237, 0.2);">
            <h3 style="color: #c4b5fd;">✨ AI Overview</h3>
            <div class="sp-summary">${escapeHtml(companyOverview)}</div>
          </div>
        `;
      }
      
      if (details.market) {
        contentHtml += `<div class="sp-section"><h3>📈 Market Status</h3>`;
        contentHtml += generateGridHTML(details.market, ['ticker', 'date']);
        contentHtml += `</div>`;
      }
      
      if (details.earnings) {
        contentHtml += `<div class="sp-section"><h3>💰 Earnings Profile</h3>`;
        contentHtml += generateGridHTML(details.earnings, ['ticker', 'last_updated']);
        contentHtml += `</div>`;
      }
      
      if (details.fundamentals) {
        contentHtml += `<div class="sp-section"><h3>🏢 Fundamentals</h3>`;
        contentHtml += generateGridHTML(details.fundamentals, ['ticker', 'quarter']);
        contentHtml += `</div>`;
      }
      
      if (details.valuation) {
        contentHtml += `<div class="sp-section"><h3>⚖️ Valuation</h3>`;
        contentHtml += generateGridHTML(details.valuation, ['ticker', 'date']);
        contentHtml += `</div>`;
      }
      
      if (details.sentiment) {
        contentHtml += `<div class="sp-section"><h3>📰 News Sentiment & Context</h3>`;
        contentHtml += `<div class="sp-summary">${escapeHtml(buildSentimentSummary(d, details))}</div>`;
        contentHtml += renderPills(topSentimentThemes(details.sentiment, 5));
        contentHtml += generateGridHTML(details.sentiment, ['ticker', 'date', 'sentiment_summary'], true);
        
        if (details.news && details.news.length > 0) {
          contentHtml += `<div style="margin-top: 16px;">`;
          details.news.forEach(n => {
            const dateStr = n.published_at ? n.published_at.substring(0, 10) : 'Unknown Date';
            const url = n.url || '#';
            const headline = n.headline || n.title || 'News Update';
            const source = n.source || 'Yahoo Finance';
            contentHtml += `
              <div class="sp-news-item">
                <a href="${url}" target="_blank">${headline}</a>
                <div class="sp-news-meta">${source} • ${dateStr}</div>
              </div>
            `;
          });
          contentHtml += `</div>`;
        }
        contentHtml += `</div>`;
      }
      
      if (details.master) {
        contentHtml += `<div class="sp-section"><h3>📊 Thematic Exposures</h3>
          <div style="position: relative; height: 260px; width: 100%;">
            <canvas id="radar-chart"></canvas>
          </div>
        </div>`;
      }

      // Powered By Footer
      contentHtml += `
        <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center;">
          <span style="font-size: 10px; font-weight: 600; color: #64748b; letter-spacing: 0.5px; text-transform: uppercase;">
            Powered by <span style="color: #7c3aed;">Yahoo Scout</span>
          </span>
        </div>
      `;

      const spContent = document.getElementById('sp-content');
      if (spContent) {
        spContent.innerHTML = contentHtml;
      } else {
        alert("CRITICAL ERROR: sp-content DOM element not found!");
      }
      
      if (details.master) {
        const exp = details.master;
        const labels = ['AI', 'Data Center', 'Consumer', 'Automotive', 'Industrial', 'China', 'Memory', 'Foundry', 'Equipment', 'Optical', 'Energy/Grid'];
        const data = [
          exp.ai_exposure_score||0, exp.data_center_exposure_score||0, exp.consumer_exposure_score||0, 
          exp.automotive_exposure_score||0, exp.industrial_exposure_score||0, exp.china_exposure_score||0, 
          exp.memory_cycle_exposure_score||0, exp.foundry_exposure_score||0, exp.equipment_cycle_exposure_score||0,
          exp.optical_networking_exposure_score||0, exp.energy_exposure_score||0
        ];
        
        const canvasEl = document.getElementById('radar-chart');
        if (canvasEl) {
          const ctx = canvasEl.getContext('2d');
          if (radarChart) {
             try { radarChart.destroy(); } catch(e) {}
          }
          if (typeof Chart !== 'undefined') {
            radarChart = new Chart(ctx, {
              type: 'radar',
              data: {
                labels: labels,
                datasets: [{
                  label: 'Exposure Score',
                  data: data,
                  backgroundColor: 'rgba(56, 189, 248, 0.2)',
                  borderColor: 'rgba(56, 189, 248, 1)',
                  pointBackgroundColor: 'rgba(56, 189, 248, 1)',
                  pointBorderColor: '#fff',
                  pointHoverBackgroundColor: '#fff',
                  pointHoverBorderColor: 'rgba(56, 189, 248, 1)'
                }]
              },
              options: {
                scales: {
                  r: {
                    angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                    grid: { color: 'rgba(255, 255, 255, 0.1)' },
                    pointLabels: { color: '#94a3b8', font: { size: 10 } },
                    ticks: { display: false, min: 0, max: 1 }
                  }
                },
                plugins: { legend: { display: false } },
                maintainAspectRatio: false
              }
            });
          } else {
            console.warn("Chart.js is not loaded.");
          }
        }
      }
    } catch (err) {
      alert("Side Panel Error: " + err.message);
      console.error(err);
    }
  }

</script>
</body>
</html>
